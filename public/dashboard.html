<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .neon-border { border: 1px solid #a16207; box-shadow: 0 0 10px rgba(161, 98, 7, 0.3); }
        .bg-glass { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-black text-yellow-600 font-mono p-6">

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="mb-10 border-b border-yellow-900 pb-4">
            <h1 class="text-4xl font-bold tracking-widest">SCORPION // CMD</h1>
            <p class="text-sm opacity-50">SISTEMA DI CONTROLLO OPERATIVO ATTIVO</p>
        </header>

        <!-- Griglia Comandi -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            
            <!-- Card Comando: Annuncio -->
            <div class="bg-glass p-6 rounded-lg neon-border">
                <h2 class="text-xl mb-4 text-white">📢 BROADCAST</h2>
                <textarea id="msg" class="w-full bg-black border border-yellow-900 p-2 mb-4 text-sm" placeholder="Messaggio..."></textarea>
                <button onclick="sendCmd('annuncio')" class="w-full bg-yellow-600 text-black font-bold py-2 hover:bg-yellow-500">ESEGUI</button>
            </div>

            <!-- Card Comando: Ban Utente -->
            <div class="bg-glass p-6 rounded-lg neon-border">
                <h2 class="text-xl mb-4 text-white">🚫 GESTIONE UTENTI</h2>
                <input id="uid" class="w-full bg-black border border-yellow-900 p-2 mb-4" placeholder="ID Utente...">
                <button onclick="sendCmd('ban')" class="w-full bg-red-900 text-red-200 font-bold py-2 hover:bg-red-800">BANNA UTENTE</button>
            </div>

            <!-- Card Stato Bot -->
            <div class="bg-glass p-6 rounded-lg neon-border flex flex-col justify-center">
                <h2 class="text-xl mb-4 text-white">⚙️ SISTEMA</h2>
                <div class="flex justify-between mb-2"><span>Status:</span> <span class="text-green-500">ONLINE</span></div>
                <div class="flex justify-between"><span>Ping:</span> <span>24ms</span></div>
            </div>
        </div>
    </div>

    <script>
        async function sendCmd(type) {
            const val = document.getElementById(type === 'annuncio' ? 'msg' : 'uid').value;
            const res = await fetch('/api/bot/comando', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ azione: type, target: val })
            });
            alert('Comando inviato!');
        }
    </script>
</body>
</html>
