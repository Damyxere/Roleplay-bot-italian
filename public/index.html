<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROLEPLAY BOT | ACCESS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        body { font-family: 'Orbitron', sans-serif; background: #000; overflow: hidden; }
        .led-border { border: 1px solid rgba(234, 179, 8, 0.3); box-shadow: 0 0 15px rgba(234, 179, 8, 0.1); }
        .glow-text { text-shadow: 0 0 10px rgba(234, 179, 8, 0.5); }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen text-white">

    <div class="absolute inset-0 opacity-20 pointer-events-none" style="background-image: radial-gradient(#eab308 0.5px, transparent 0.5px); background-size: 30px 30px;"></div>

    <div class="relative z-10 p-10 bg-black/80 rounded-2xl led-border w-full max-w-md text-center">
        
        <h1 class="text-4xl font-black italic tracking-tighter mb-1 glow-text">ROLEPLAY<span class="text-yellow-500">BOT</span></h1>
        <p class="text-[10px] tracking-[0.2em] text-gray-500 mb-8">ADMIN SYSTEM CONNECTED</p>

        <div class="flex items-center justify-center gap-2 mb-10">
            <div class="w-2 h-2 bg-yellow-500 rounded-full pulse"></div>
            <span class="text-[10px] uppercase text-yellow-500">System Ready</span>
        </div>

        <a href="/auth/discord" 
           class="block w-full py-4 border border-yellow-600 bg-yellow-600/10 hover:bg-yellow-600 hover:text-black font-bold transition-all duration-300 rounded-lg shadow-[0_0_15px_rgba(202,138,4,0.3)]">
           ACCEDI CON DISCORD
        </a>

        <p class="mt-8 text-[9px] text-gray-600">PROTETTO DA OAUTH2 • ROLEPLAY ITALIAN</p>
    </div>

</body>
