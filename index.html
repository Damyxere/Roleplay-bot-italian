<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scorpion OS | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-card { background: rgba(31, 41, 55, 0.7); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gray-950 text-white min-h-screen font-sans">

    <!-- Navbar -->
    <nav class="border-b border-gray-800 p-4 flex justify-between items-center bg-gray-900/50">
        <h1 class="text-2xl font-black italic tracking-tighter text-yellow-500">SCORPION<span class="text-white">OS</span></h1>
        <div class="flex items-center gap-4">
            <div class="text-right">
                <p class="text-xs text-gray-400">Loggato come</p>
                <p class="text-sm font-bold">Scorpion</p>
            </div>
            <button class="bg-red-600/20 text-red-500 px-4 py-1 rounded-full text-sm border border-red-900 hover:bg-red-600 hover:text-white transition">Logout</button>
        </div>
    </nav>

    <!-- Main Dashboard -->
    <main class="p-6 max-w-7xl mx-auto space-y-8">
        
        <!-- Stats Grid -->
        <section class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="glass-card p-6 rounded-2xl border border-gray-700">
                <h3 class="text-gray-400 text-sm">Server Totali</h3>
                <p class="text-3xl font-bold mt-1">42</p>
            </div>
            <div class="glass-card p-6 rounded-2xl border border-gray-700">
                <h3 class="text-gray-400 text-sm">Utenti Premium</h3>
                <p class="text-3xl font-bold mt-1 text-yellow-500">12</p>
            </div>
            <div class="glass-card p-6 rounded-2xl border border-gray-700">
                <h3 class="text-gray-400 text-sm">Server Blacklist</h3>
                <p class="text-3xl font-bold mt-1 text-red-500">3</p>
            </div>
        </section>

        <!-- Operations Section -->
        <section class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <!-- Pannello Premium -->
            <div class="bg-gray-900 p-8 rounded-3xl border border-gray-800">
                <h2 class="text-xl font-bold mb-6 flex items-center gap-2">💎 Gestione Premium</h2>
                <div class="space-y-4">
                    <input type="text" placeholder="ID Utente o Username" class="w-full bg-gray-950 p-4 rounded-xl border border-gray-700 focus:border-yellow-500 outline-none transition">
                    <select class="w-full bg-gray-950 p-4 rounded-xl border border-gray-700 outline-none">
                        <option>30 Giorni</option>
                        <option>60 Giorni</option>
                        <option>1 Anno</option>
                    </select>
                    <button class="w-full bg-yellow-600 hover:bg-yellow-500 py-4 rounded-xl font-bold text-black transition transform active:scale-95">Attiva Premium</button>
                </div>
            </div>

            <!-- Pannello Blacklist -->
            <div class="bg-gray-900 p-8 rounded-3xl border border-gray-800">
                <h2 class="text-xl font-bold mb-6 flex items-center gap-2 text-red-500">🚫 Blacklist Admin</h2>
                <div class="space-y-4">
                    <input type="text" placeholder="ID Server" class="w-full bg-gray-950 p-4 rounded-xl border border-gray-700 focus:border-red-500 outline-none transition">
                    <button class="w-full border border-red-900 text-red-500 hover:bg-red-600 hover:text-white py-4 rounded-xl font-bold transition">Blocca Server</button>
                </div>
            </div>

        </section>
    </main>

</body>
</html>
